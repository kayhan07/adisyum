groups:
  - name: adisyum_alerts
    interval: 30s
    rules:
      # Application Availability
      - alert: HighErrorRate
        expr: rate(adisyum_http_errors_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over last 5 minutes"

      - alert: ApplicationDown
        expr: up{job="adisyum-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Application is down"
          description: "ADİSYUM application has been down for 1 minute"

      # Request Performance
      - alert: HighResponseTime
        expr: histogram_quantile(0.99, adisyum_http_request_duration_seconds) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "99th percentile response time is {{ $value }}s"

      - alert: HighP95ResponseTime
        expr: histogram_quantile(0.95, adisyum_http_request_duration_seconds) > 0.5
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "Elevated response times"
          description: "95th percentile response time is {{ $value }}s"

      # Database
      - alert: DatabaseConnectionPoolSaturation
        expr: pg_stat_activity_count{datname="adisyum"} / 20 > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool near saturation"
          description: "{{ $value | humanizePercentage }} of connection pool used"

      - alert: SlowDatabaseQueries
        expr: rate(pg_stat_statements_mean_exec_time[5m]) > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries detected"
          description: "Average query execution time is {{ $value }}ms"

      - alert: DatabaseDiskSpaceLow
        expr: pg_database_size_bytes / 1024 / 1024 / 1024 > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Database disk utilization high"
          description: "Database size is {{ $value }}GB"

      # Redis
      - alert: HighRedisMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Redis memory usage"
          description: "Redis memory usage is {{ $value | humanizePercentage }}"

      - alert: RedisConnectionPoolSaturation
        expr: redis_connected_clients / 100 > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Redis connection pool near saturation"
          description: "{{ $value | humanizePercentage }} of connections used"

      # WebSocket
      - alert: HighWebSocketConnectionCount
        expr: adisyum_websocket_connections_total > 5000
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "High WebSocket connection count"
          description: "{{ $value }} active WebSocket connections"

      - alert: WebSocketConnectionErrors
        expr: increase(adisyum_websocket_errors_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket errors detected"
          description: "{{ $value }} WebSocket errors in last 5 minutes"

      # Tenant Isolation
      - alert: TenantDataLeakDetected
        expr: adisyum_tenant_isolation_violations_total > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Potential tenant data leak detected"
          description: "{{ $value }} isolation violations detected"

      - alert: CrossTenantCacheAccess
        expr: adisyum_cache_cross_tenant_access_total > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Cross-tenant cache access detected"
          description: "{{ $value }} cross-tenant cache accesses detected"

      # System Health
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High system memory usage"
          description: "System memory usage is {{ $value | humanizePercentage }}"

      - alert: HighCPUUsage
        expr: rate(node_cpu_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }}"

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space"
          description: "Disk usage is {{ $value | humanizePercentage }}"

      # Service Quality
      - alert: TooManyRequeues
        expr: adisyum_offline_queue_requeue_total > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High offline queue requeue rate"
          description: "{{ $value }} items requeued"

      - alert: CacheMissRate
        expr: rate(adisyum_cache_misses_total[5m]) / (rate(adisyum_cache_hits_total[5m]) + rate(adisyum_cache_misses_total[5m])) > 0.2
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "High cache miss rate"
          description: "Cache miss rate is {{ $value | humanizePercentage }}"
