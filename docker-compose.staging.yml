version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: adisyum-postgres-staging
    environment:
      POSTGRES_USER: adisyum
      POSTGRES_PASSWORD: staging-password
      POSTGRES_DB: adisyum_staging
      POSTGRES_INITDB_ARGS: "-c max_connections=200 -c shared_buffers=256MB -c effective_cache_size=1GB -c work_mem=4MB -c maintenance_work_mem=64MB"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adisyum"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adisyum-staging
    labels:
      service: database

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: adisyum-redis-staging
    command: >
      redis-server
      --requirepass staging-redis-password
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "staging-redis-password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adisyum-staging
    labels:
      service: cache

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: adisyum-nginx-staging
    volumes:
      - ./deploy/nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    networks:
      - adisyum-staging
    labels:
      service: proxy

  # Next.js Application (Node.js)
  app:
    build:
      context: .
      dockerfile: Dockerfile.staging
    container_name: adisyum-app-staging
    environment:
      NODE_ENV: staging
      DATABASE_URL: postgresql://adisyum:staging-password@postgres:5432/adisyum_staging
      REDIS_URL: redis://:staging-redis-password@redis:6379/0
      LOG_LEVEL: info
      ENABLE_METRICS: "true"
      ENABLE_PROFILING: "true"
    volumes:
      - ./app:/app/app
      - ./lib:/app/lib
      - ./components:/app/components
      - app_logs:/var/log/adisyum
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adisyum-staging
    restart: on-failure
    labels:
      service: application

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: adisyum-prometheus-staging
    volumes:
      - ./deploy/prometheus/staging.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - adisyum-staging
    labels:
      service: monitoring

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: adisyum-grafana-staging
    environment:
      GF_SECURITY_ADMIN_PASSWORD: staging-password
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - adisyum-staging
    labels:
      service: dashboard

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: adisyum-redis-exporter-staging
    environment:
      REDIS_ADDR: redis://redispass:staging-redis-password@redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - adisyum-staging
    labels:
      service: monitoring

  # Postgres Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: adisyum-postgres-exporter-staging
    environment:
      DATA_SOURCE_NAME: postgresql://adisyum:staging-password@postgres:5432/adisyum_staging?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - adisyum-staging
    labels:
      service: monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  nginx_logs:
    driver: local
  app_logs:
    driver: local

networks:
  adisyum-staging:
    driver: bridge
